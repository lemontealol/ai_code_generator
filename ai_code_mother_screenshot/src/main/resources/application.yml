spring:
    application:
        name: ai_code_mother_screenshot
    profiles:
      active: local
server:
  port: 8082
  servlet:
    context-path: /api
# Dubbo
dubbo:
  registry:
    address: nacos://127.0.0.1:8848
    register-mode: instance
  protocol:
    name: tri
    port: 50054
  consumer:
    timeout: 60000
  provider:
    timeout: 60000
  application:
    qos-enable: true
    qos-port: 33333
