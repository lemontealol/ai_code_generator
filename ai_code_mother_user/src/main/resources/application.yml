spring:
    application:
        name: yu-ai-code-mother-user
    datasource:
      url: jdbc:mysql://localhost:3306/microserver_ai_code_mother?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8
      username: root
      password: lwn
      driver-class-name: com.mysql.cj.jdbc.Driver
    session:
      redis:
        repository-type: default
      #    30天后过期
      timeout: 2592000
    data:
      redis:
        host: localhost
        port: 6379
        database: 0
